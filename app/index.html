<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Skate Performances</title>

  <!-- Correct folder path -->
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="icon" href="favicon.ico">

  <style>
    /* Full-page cinematic background */
    body {
      background: url("images/roll-index.jpg") no-repeat center center fixed;
      background-size: cover;
      background-color: #000; /* fallback */
    }

    /* Add a subtle overlay for readability */
    .landing-page {
      backdrop-filter: blur(2px);
      background: rgba(0, 0, 0, 0.35);
      padding-bottom: 80px;
    }
  </style>
</head>

<body>

<header class="header">
  <div class="logo">ROLL SHOW</div>

  <nav class="nav">
    <a href="auth-login.html">Login</a>
    <a href="buyer-profile.html">My Tickets</a>
    <button id="themeToggle">Theme</button>
  </nav>
</header>

<main class="landing-page">

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Skate Performances From Every Discipline</h1>
      <p class="subtitle">Buy tickets, watch shows, support skaters, and experience the culture.</p>
      <a class="cta" href="auth-signup.html">Become a Skater</a>
    </div>

    <div class="hero-art">
      <div class="hero-circle"></div>
      <div class="hero-glow"></div>
    </div>
  </section>

  <!-- Featured Shows -->
  <section class="featured-section">
    <h2>Featured Shows</h2>
    <div id="featuredShows" class="featured-grid">
      <!-- JS injects featured shows -->
    </div>
  </section>

  <!-- Explore All Shows -->
  <section class="explore-section">
    <h2>Explore All Shows</h2>
    <p class="section-subtitle">Discover performances from skaters across every style and discipline.</p>

    <div id="showGrid" class="show-grid">
      <!-- JS injects show cards -->
    </div>
  </section>

</main>

<footer class="footer">
  <p>© Roll Show</p>
</footer>

<!-- Correct JS path -->
<script src="js/app.js" defer></script>

</body>
</html>

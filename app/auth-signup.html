<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Signup</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="icon" href="favicon.ico">
</head>

<body style="background:none !important;">

  <!-- FULL CINEMATIC BACKGROUND -->
  <img src="images/roll-show.jpg" class="framed-photo" alt="Background">
  <div class="photo-overlay"></div>

  <main class="auth-container" style="background:none !important;">
    <div class="auth-box" style="background:none !important; box-shadow:none !important; border:none !important;">

      <h1 style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">
        Create Your Account
      </h1>

      <form id="signupForm" class="auth-form">
        <input type="text" id="signupName" placeholder="Name" required>
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Password" required>

        <select id="signupRole" required>
          <option value="buyer">Ticket Buyer</option>
          <option value="skater">Skater</option>
        </select>

        <button type="submit" class="btn-primary">Create Account</button>
      </form>

      <p class="switch-link" style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">
        Already have an account?
        <a href="auth-login.html" style="color:white; text-decoration:underline;">Login</a>
      </p>

    </div>
  </main>

  <script src="js/app.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Login</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="icon" href="favicon.ico">
</head>

<body style="background:none !important;">

  <!-- FULL CINEMATIC BACKGROUND -->
  <img src="images/roll-show.jpg" class="framed-photo" alt="Background">
  <div class="photo-overlay"></div>

  <main class="auth-container" style="background:none !important;">
    <div class="auth-box" style="background:none !important; box-shadow:none !important; border:none !important;">

      <h1 style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">Welcome Back</h1>

      <form id="loginForm" class="auth-form">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit" class="btn-primary">Login</button>
      </form>

      <p class="switch-link" style="color:white; text-shadow:0 3px 8px rgba(0,0,0,0.6);">
        Don’t have an account?
        <a href="auth-signup.html" style="color:white; text-decoration:underline;">Create one</a>
      </p>

    </div>
  </main>

  <script src="js/app.js" defer></script>
</body>
</html>

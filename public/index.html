<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Welcome</title>

  <!-- MOBILE + PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">

  <!-- ICONS -->
  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/app/images/icons/icon-512.png">

  <!-- MANIFEST -->
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- LANDING PAGE CSS -->
  <link rel="stylesheet" href="/app/styles/landing.css">

  <!-- SERVICE WORKER -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</head>

<body>

  <!-- BACKGROUND -->
  <img src="/app/images/roll-index.jpg" class="bg-landing" alt="Background">

  <!-- MAIN CONTENT -->
  <main class="landing-container">

    <h1 class="landing-title">Roll Show</h1>
    <p class="landing-subtitle">Skate Performances • Culture • Community</p>

    <div class="role-grid">

      <!-- BUYER -->
      <div class="role-card">
        <h2>Ticket Buyer</h2>
        <p>Buy tickets and watch shows.</p>
        <a class="role-btn" href="/pages/auth-login.html?role=buyer">Login</a>
        <a class="role-btn" href="/pages/signup-buyer.html">Sign Up</a>
      </div>

      <!-- SKATER -->
      <div class="role-card">
        <h2>Skater</h2>
        <p>Perform, build your brand, and earn.</p>
        <a class="role-btn" href="/pages/auth-login.html?role=skater">Login</a>
        <a class="role-btn" href="/pages/signup-skater.html">Sign Up</a>
      </div>

      <!-- BUSINESS / CELEBRITY -->
      <div class="role-card">
        <h2>Business / Celebrity</h2>
        <p>Make offers and collaborate with skaters.</p>
        <a class="role-btn" href="/pages/auth-login.html?role=business">Login</a>
        <a class="role-btn" href="/pages/signup-business.html">Register</a>
      </div>

    </div>

  </main>

</body>
</html>

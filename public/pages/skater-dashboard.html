<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Skater Dashboard – Roll Show</title>

  <!-- MOBILE + PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">

  <!-- SOCIAL SHARE -->
  <meta property="og:title" content="Skater Dashboard – Roll Show">
  <meta property="og:description" content="Manage your shows, branding, offers, and performance tools.">
  <meta property="og:image" content="/app/images/roll-skater-dash.jpg">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Skater Dashboard – Roll Show">
  <meta name="twitter:description" content="Your performance, your brand, your tools.">
  <meta name="twitter:image" content="/app/images/roll-skater-dash.jpg">

  <!-- ICONS -->
  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/app/images/icons/icon-512.png">

  <!-- MANIFEST -->
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- STYLES -->
  <link rel="stylesheet" href="/app/styles/styles.css">
</head>

<body style="background:black;">

  <!-- BACKGROUND (swap path anytime) -->
  <img src="/app/images/roll-skater-dash.jpg" class="bg-full">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">ROLL SHOW</div>

    <nav class="nav">
      <a href="/pages/create-show.html">Create Show</a>
      <a href="/pages/video-studio.html">Video Studio</a>
      <a href="/pages/branding-studio.html">Branding Studio</a>
      <button id="themeToggle">Theme</button>
      <button class="logout-btn">Logout</button>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="skater-dashboard-page">

    <!-- HERO -->
    <section class="dashboard-hero">
      <h1 id="skaterWelcome">Welcome, Skater</h1>
      <p class="subtitle">Manage your shows, track your sales, and build your brand.</p>
    </section>

    <!-- QUICK ACTIONS -->
    <section class="quick-actions">
      <button class="quick-btn" onclick="window.location.href='/pages/create-show.html'">+ New Show</button>
      <button class="quick-btn" onclick="window.location.href='/pages/video-studio.html'">Open Video Studio</button>
      <button class="quick-btn" onclick="window.location.href='/pages/branding-studio.html'">Open Branding Studio</button>
    </section>

    <!-- STATS -->
    <section class="stats-row">
      <div class="stat-card">
        <h3>Total Shows</h3>
        <p id="statShows">0</p>
      </div>

      <div class="stat-card">
        <h3>Tickets Sold</h3>
        <p id="statTickets">0</p>
      </div>

      <div class="stat-card">
        <h3>Total Revenue</h3>
        <p id="statRevenue">$0</p>
      </div>
    </section>

    <!-- SHOW LIST -->
    <section class="shows-section">
      <div class="section-header">
        <h2>Your Shows</h2>
        <p class="section-subtitle">Manage your published and upcoming performances.</p>
      </div>

      <div id="skaterShows" class="show-grid">
        <!-- JS injects show cards -->
      </div>
    </section>

  </main>

  <!-- ROLE LOCK (Skaters Only) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = requireUser(["skater"]);
      if (!user) return;
      document.getElementById("skaterWelcome").textContent = `Welcome, ${user.name}`;
    });
  </script>

  <!-- JS -->
  <script src="/app/js/app.js" defer></script>

</body>
</html>

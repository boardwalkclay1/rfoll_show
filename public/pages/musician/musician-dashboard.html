<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show — Musician Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/app/images/icons/icon-512.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta property="og:image" content="/app/images/roll-index.jpg">

  <link rel="stylesheet" href="/app/styles/styles.css">
  <link rel="stylesheet" href="/app/styles/dashboard.css">
</head>

<body class="rs-body">
  <img src="/app/images/bg-artist-dash.jpg" class="bg-landing" alt="Background">

  <main class="rs-dash-shell rs-dash-musician">
    <header class="rs-dash-header">
      <div>
        <h1 class="rs-dash-title" id="artist-name">Artist</h1>
        <p class="rs-dash-sub">Your tracks, licenses, and earnings.</p>
      </div>
      <div class="rs-dash-stat" id="artist-earnings">$0.00</div>
    </header>

    <section class="rs-dash-grid">
      <article class="rs-dash-card">
        <h3>Your Tracks</h3>
        <ul class="rs-dash-list" id="artist-tracks"></ul>
      </article>

      <article class="rs-dash-card">
        <h3>Licenses</h3>
        <ul class="rs-dash-list" id="artist-licenses"></ul>
      </article>
    </section>

    <p class="rs-dash-status" id="artist-status"></p>
  </main>

  <script type="module" src="/app/js/musician/musician-dashboard.js"></script>
</body>
</html>

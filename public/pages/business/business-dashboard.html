<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Dashboard</title>

  <link rel="icon" href="/img/favicon.png" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>

<body style="background-image: url('/img/dashboard-bg.jpg');">

  <!-- BURGER MENU -->
  <nav id="rs-burger-menu" class="rs-burger-menu"></nav>

  <!-- HERO -->
  <header class="rs-hero">
    <h1 id="business-hero-name"></h1>
    <p id="business-hero-subtitle"></p>
    <div id="business-hero-earnings" class="rs-hero-earnings"></div>
  </header>

  <!-- ANALYTICS CHIPS -->
  <section id="business-analytics-chips" class="rs-chip-scroll"></section>

  <!-- GHOST ACTION BUTTONS -->
  <section id="business-ghost-actions" class="rs-ghost-grid"></section>

  <!-- SHOWS -->
  <section class="rs-section">
    <h2>Shows</h2>
    <div id="business-shows-cards" class="rs-card-grid"></div>
  </section>

  <!-- CAMPAIGNS -->
  <section class="rs-section">
    <h2>Campaigns</h2>
    <div id="business-campaigns-cards" class="rs-card-grid"></div>
  </section>

  <!-- SPONSORSHIPS -->
  <section class="rs-section">
    <h2>Sponsorships</h2>
    <div id="business-sponsorships-cards" class="rs-card-grid"></div>
  </section>

  <script src="/app/js/business/business-dashboard.js"></script>
</body>
</html>

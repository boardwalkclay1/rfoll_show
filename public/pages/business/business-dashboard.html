<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show — Business Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/app/styles/styles.css">
  <link rel="stylesheet" href="/app/styles/dashboard.css">
</head>

<body class="rs-body">
  <img src="/app/images/bg-business-dash.jpg" class="bg-landing" alt="Background">

  <main class="rs-dash-shell rs-dash-business">
    <header class="rs-dash-header">
      <div>
        <h1 class="rs-dash-title" id="business-name">Business</h1>
        <p class="rs-dash-sub">Your offers, contracts, and performance.</p>
      </div>
      <div class="rs-dash-stat" id="business-revenue">$0.00</div>
    </header>

    <nav class="rs-dash-nav" id="business-nav"></nav>

    <section class="rs-dash-grid">
      <article class="rs-dash-card">
        <h3>Active Offers</h3>
        <ul class="rs-dash-list" id="business-offers"></ul>
      </article>

      <article class="rs-dash-card">
        <h3>Contracts</h3>
        <ul class="rs-dash-list" id="business-contracts"></ul>
      </article>
    </section>

    <p class="rs-dash-status" id="business-status"></p>
  </main>

  <script type="module" src="/app/js/business/business-dashboard.js"></script>
</body>
</html>

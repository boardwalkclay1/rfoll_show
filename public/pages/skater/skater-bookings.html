<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bookings • Roll Show</title>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/skater.css" />
</head>
<body class="bg-skater">

  <div class="skater-shell">
    <header class="page-header">
      <h1>Bookings</h1>
      <div class="tabs">
        <button data-tab="incoming" class="tab active">Incoming</button>
        <button data-tab="outgoing" class="tab">Outgoing</button>
      </div>
    </header>

    <main class="skater-main">
      <section class="skater-section" id="incoming-bookings"></section>
      <section class="skater-section hidden" id="outgoing-bookings"></section>
    </main>
  </div>

  <script type="module" src="/js/skater/skater-bookings.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show — Skater Shows</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/app/styles/styles.css">
  <link rel="stylesheet" href="/app/styles/dashboard.css">
</head>

<body class="rs-body">
  <img src="/app/images/bg-skater-dash.jpg" class="bg-landing" alt="Background">

  <main class="rs-dash-shell rs-dash-skater">
    <header class="rs-dash-header">
      <div>
        <h1 class="rs-dash-title">Shows</h1>
        <p class="rs-dash-sub">Full list of your shows.</p>
      </div>
    </header>

    <nav class="rs-dash-nav" id="skater-nav"></nav>

    <section class="rs-dash-card">
      <h3>All Shows</h3>
      <ul class="rs-dash-list" id="skater-shows-full"></ul>
    </section>

    <p class="rs-dash-status" id="skater-status"></p>
  </main>

  <script type="module" src="/app/js/skater/skater-shows.js"></script>
</body>
</html>

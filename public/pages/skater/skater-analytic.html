<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Analytics • Roll Show</title>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/skater.css" />
</head>
<body class="bg-skater">

  <div class="skater-shell">
    <header class="page-header">
      <h1>Analytics</h1>
      <div class="analytics-filters">
        <button data-range="7" class="chip active">7 days</button>
        <button data-range="30" class="chip">30 days</button>
        <button data-range="90" class="chip">90 days</button>
      </div>
    </header>

    <main class="skater-main grid-2">
      <section class="skater-section">
        <h2>Overview</h2>
        <div id="analytics-overview" class="stats-grid"></div>
      </section>

      <section class="skater-section">
        <h2>Top Content</h2>
        <div id="analytics-top-content" class="mini-list"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/js/skater/skater-analytics.js?v=9999"></script>
</body>
</html>

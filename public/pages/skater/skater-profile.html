<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Skater Profile • Roll Show</title>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/skater.css" />
</head>
<body class="bg-skater">

  <div class="skater-shell">
    <header class="skater-header">
      <div class="skater-avatar" id="skater-avatar"></div>
      <div class="skater-header-text">
        <h1 id="skater-name">Skater Name</h1>
        <p id="skater-discipline">Discipline • Subclass</p>
        <p id="skater-location">City, State</p>
      </div>
      <div class="skater-header-actions">
        <button id="edit-profile-btn" class="btn-primary">Edit Profile</button>
        <button id="book-skater-btn" class="btn-outline">Book Me</button>
      </div>
    </header>

    <main class="skater-main">
      <section class="skater-section">
        <h2>Bio</h2>
        <p id="skater-bio">Loading bio...</p>
      </section>

      <section class="skater-section grid-3">
        <div>
          <h3>Shows</h3>
          <div id="profile-shows" class="mini-list"></div>
        </div>
        <div>
          <h3>Skate Cards</h3>
          <div id="profile-cards" class="mini-list"></div>
        </div>
        <div>
          <h3>Music</h3>
          <div id="profile-music" class="mini-list"></div>
        </div>
      </section>

      <section class="skater-section">
        <h2>Feed</h2>
        <div id="profile-feed" class="feed-list"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/js/skater/skater-profile.js"></script>
</body>
</html>

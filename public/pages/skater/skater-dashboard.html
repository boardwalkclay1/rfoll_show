<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show — Skater Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/app/images/icons/icon-512.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta property="og:image" content="/app/images/roll-index.jpg">

  <link rel="stylesheet" href="/app/styles/styles.css">
  <link rel="stylesheet" href="/app/styles/dashboard.css">
</head>

<body class="rs-body">
  <img src="/app/images/bg-skater-dash.jpg" class="bg-landing" alt="Background">

  <main class="rs-dash-shell rs-dash-skater">
    <header class="rs-dash-header">
      <div>
        <h1 class="rs-dash-title" id="skater-name">Skater</h1>
        <p class="rs-dash-sub">Your feed, shows, lessons, and earnings.</p>
      </div>
      <div class="rs-dash-stat" id="skater-earnings">$0.00</div>
    </header>

    <nav class="rs-dash-nav" id="skater-nav"></nav>

    <section class="rs-dash-grid">
      <article class="rs-dash-card">
        <h3>Upcoming Shows</h3>
        <ul class="rs-dash-list" id="skater-shows"></ul>
      </article>

      <article class="rs-dash-card">
        <h3>Quick Stats</h3>
        <p>Total shows: <span id="skater-total-shows">0</span></p>
        <p>Total tickets: <span id="skater-total-tickets">0</span></p>
      </article>
    </section>

    <p class="rs-dash-status" id="skater-status"></p>
  </main>

  <script type="module" src="/app/js/skater/skater-dashboard.js"></script>
</body>
</html>

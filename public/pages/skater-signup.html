<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Roll Show – Skater Signup</title>

  <!-- MOBILE + PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">

  <!-- SOCIAL SHARE -->
  <meta property="og:title" content="Roll Show – Skater Signup">
  <meta property="og:description" content="Join Roll Show as a skater and build your performance career.">
  <meta property="og:image" content="/app/images/roll-show.jpg">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Roll Show – Skater Signup">
  <meta name="twitter:description" content="Become a skater and start performing.">
  <meta name="twitter:image" content="/app/images/roll-show.jpg">

  <!-- ICONS -->
  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/app/images/icons/icon-512.png">

  <!-- MANIFEST -->
  <link rel="manifest" href="/manifest.webmanifest">

  <!-- STYLES -->
  <link rel="stylesheet" href="/app/styles/styles.css">
</head>

<body style="background:black;">

  <!-- BACKGROUND (swap path anytime) -->
  <img src="/app/images/roll-show.jpg" class="bg-full">

  <!-- SIGNUP WRAPPER -->
  <main class="auth-container">

    <div class="auth-box">

      <h1>Join as a Skater</h1>

      <form id="signupForm" class="auth-form">

        <input type="text" id="signupName" placeholder="Name" required>
        <input type="email" id="signupEmail" placeholder="Email" required>
        <input type="password" id="signupPassword" placeholder="Password" required>

        <!-- Hard‑coded role -->
        <input type="hidden" id="signupRole" value="skater">

        <button type="submit" class="btn-primary">Create Skater Account</button>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="/pages/auth-login.html">Login</a>
      </p>

    </div>

  </main>

  <!-- JS -->
  <script src="/app/js/app.js" defer></script>
</body>
</html>

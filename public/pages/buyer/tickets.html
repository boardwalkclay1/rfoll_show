<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show — Tickets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/app/styles/styles.css">
  <link rel="stylesheet" href="/app/styles/dashboard.css">
</head>

<body class="rs-body">
  <img src="/app/images/bg-buyer-dash.jpg" class="bg-landing" alt="Background">

  <main class="rs-dash-shell rs-dash-buyer">
    <header class="rs-dash-header">
      <div>
        <h1 class="rs-dash-title">Tickets</h1>
        <p class="rs-dash-sub">All your tickets.</p>
      </div>
    </header>

    <nav class="rs-dash-nav" id="buyer-nav"></nav>

    <section class="rs-dash-card">
      <h3>All Tickets</h3>
      <ul class="rs-dash-list" id="buyer-tickets-full"></ul>
    </section>

    <p class="rs-dash-status" id="buyer-status"></p>
  </main>

  <script type="module" src="/app/js/buyer/buyer-tickets.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buyer Signup – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/app/styles/styles.css">

  <style>
    /* BACK BUTTON — TOP LEFT */
    .back-btn {
      position:absolute;
      top:20px;
      left:20px;
      background:rgba(0,0,0,0.55);
      padding:10px 16px;
      border-radius:8px;
      color:white;
      font-weight:600;
      text-decoration:none;
      backdrop-filter:blur(4px);
      transition:.2s;
      z-index:10;
    }
    .back-btn:hover {
      background:rgba(0,0,0,0.75);
    }

    /* CHECKERED YELLOW + BLACK LEARN BUTTON */
    .learn-btn {
      display:block;
      margin-top:18px;
      text-align:center;
      padding:14px 20px;
      border-radius:10px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:0.05em;
      color:#000000;
      text-decoration:none;
      background:
        repeating-linear-gradient(
          45deg,
          #f5d000 0,
          #f5d000 12px,
          #000000 12px,
          #000000 24px
        );
      box-shadow:0 10px 30px rgba(0,0,0,0.45);
      transition:.2s;
    }
    .learn-btn:hover {
      transform:translateY(-2px);
      box-shadow:0 14px 40px rgba(0,0,0,0.55);
    }
  </style>
</head>

<body style="background:url('/app/images/roll-groovy.jpg') center -10px / cover no-repeat;">

  <!-- BACK BUTTON -->
  <a href="/index.html" class="back-btn">← Back</a>

  <main class="signup-shell">
    <h1>Create Buyer Account</h1>

    <form id="buyer-signup-form" class="signup-form">
      <input name="name" placeholder="Full Name" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>

    <!-- CHECKERED LEARN BUTTON -->
    <a href="/pages/learn/learn-buyer.html" class="learn-btn">
      Learn More About Being a Buyer
    </a>

    <p class="signup-login-link">
      Already have an account?
      <a href="/pages/auth-login.html?role=buyer">Log in</a>
    </p>
  </main>

  <script type="module" src="/app/js/buyer/buyer-signup.js"></script>
</body>
</html>

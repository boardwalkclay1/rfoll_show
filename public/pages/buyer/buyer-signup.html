<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buyer Signup – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/app/styles/styles.css">
</head>

<body style="background:url('/app/images/roll-groovy.jpg') center -10px / cover no-repeat;">

  <main class="signup-shell">
    <h1>Create Buyer Account</h1>

    <form id="buyer-signup-form" class="signup-form">
      <input name="name" placeholder="Full Name" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>

    <!-- NEW: Back to Home -->
    <p class="signup-login-link">
      <a href="/index.html">← Back to Home</a>
    </p>

    <!-- NEW: Learn More -->
    <p class="signup-login-link">
      <a href="/pages/buyer-learn-more.html">Learn more about being a Buyer</a>
    </p>

  </main>

  <script type="module" src="/app/js/buyer/buyer-signup.js"></script>
</body>
</html>

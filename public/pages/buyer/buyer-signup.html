<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Buyer Signup – Roll Show</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/app/styles/styles.css">

  <!-- REAL CURSIVE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

  <style>
    /* BACK BUTTON — TOP LEFT */
    .back-btn {
      position:absolute;
      top:20px;
      left:20px;
      background:rgba(0,0,0,0.55);
      padding:10px 16px;
      border-radius:8px;
      color:white;
      font-weight:600;
      text-decoration:none;
      backdrop-filter:blur(4px);
      transition:.2s;
      z-index:10;
      font-family:"Dancing Script", cursive;
      font-size:22px;
    }
    .back-btn:hover {
      background:rgba(0,0,0,0.75);
    }

    /* LEARN BUTTON — WHITE + BLACK BORDER + CURSIVE */
    .learn-btn {
      display:block;
      margin-top:18px;
      text-align:center;
      padding:12px 18px;
      border-radius:10px;
      font-weight:700;
      color:#000000;
      text-decoration:none;
      background:#ffffff;
      border:3px solid #000000;
      transition:.2s;
      font-family:"Dancing Script", cursive !important;
      font-size:26px;
      letter-spacing:0.5px;
    }
    .learn-btn:hover {
      background:#f2f2f2;
      transform:translateY(-2px);
    }

    /* LOGIN LINK — SLIGHTLY BIGGER + CURSIVE */
    .signup-login-link a {
      font-family:"Dancing Script", cursive !important;
      font-size:22px;
      font-weight:700;
      color:#ffffff;
      text-decoration:underline;
    }
  </style>
</head>

<body style="background:url('/app/images/roll-groovy.jpg') center -10px / cover no-repeat;">

  <!-- BACK BUTTON -->
  <a href="/index.html" class="back-btn">← Back</a>

  <main class="signup-shell">
    <h1>Create Buyer Account</h1>

    <form id="buyer-signup-form" class="signup-form">
      <input name="name" placeholder="Full Name" required>
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>

    <!-- WHITE + BLACK LEARN BUTTON -->
    <a href="/pages/learn/learn-buyer.html" class="learn-btn">
      Learn More About Being a Buyer
    </a>

    <p class="signup-login-link">
      Already have an account?
      <a href="/pages/auth-login.html?role=buyer">Log in</a>
    </p>
  </main>

  <script type="module" src="/app/js/buyer/buyer-signup.js"></script>
</body>
</html>

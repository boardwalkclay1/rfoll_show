<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show — Buyer Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/app/styles/styles.css">
  <link rel="stylesheet" href="/app/styles/dashboard.css">
</head>

<body class="rs-body">
  <img src="/app/images/bg-buyer-dash.jpg" class="bg-landing" alt="Background">

  <main class="rs-dash-shell rs-dash-buyer">
    <header class="rs-dash-header">
      <div>
        <h1 class="rs-dash-title" id="buyer-name">Buyer</h1>
        <p class="rs-dash-sub">Your tickets and recent purchases.</p>
      </div>
    </header>

    <nav class="rs-dash-nav" id="buyer-nav"></nav>

    <section class="rs-dash-grid">
      <article class="rs-dash-card">
        <h3>Recent Tickets</h3>
        <ul class="rs-dash-list" id="buyer-tickets"></ul>
      </article>

      <article class="rs-dash-card">
        <h3>Recent Purchases</h3>
        <ul class="rs-dash-list" id="buyer-purchases"></ul>
      </article>
    </section>

    <p class="rs-dash-status" id="buyer-status"></p>
  </main>

  <script type="module" src="/app/js/buyer/buyer-dashboard.js"></script>
</body>
</html>

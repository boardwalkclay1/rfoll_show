<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show – Collab Result</title>

  <link rel="icon" type="image/png" href="/assets/icons/rollshow-favicon.png" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/collabs.css" />

  <style>
    :root {
      --collabs-bg-image: url('/assets/backgrounds/collab-result-bg.jpg');
    }

    body.collab-result-page {
      background-image: var(--collabs-bg-image);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .result-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
    }

    .collabs-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
    }

    .brand-title {
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      border: 1px solid rgba(255, 255, 255, 0.18);
      opacity: 0.8;
    }

    .result-main {
      flex: 1;
      padding: 1rem 1.5rem 5rem;
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.2fr);
      gap: 1.25rem;
    }

    .panel {
      background: rgba(10, 10, 15, 0.9);
      border-radius: 16px;
      padding: 1rem 1.25rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
    }

    .panel-title {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.9;
      margin-bottom: 0.75rem;
    }

    .video-preview {
      width: 100%;
      height: 320px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      opacity: 0.8;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffb86c, #ff6b6b);
      border: none;
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      color: #0b0b10;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .sidebar-section {
      margin-bottom: 1.25rem;
    }

    .sidebar-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-size: 0.8rem;
      opacity: 0.85;
    }

    .sidebar-item span {
      display: block;
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0.5rem 1.5rem 0.9rem;
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
      backdrop-filter: blur(16px);
    }

    .bottom-nav-btn {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 0.75rem;
      text-align: center;
      cursor: pointer;
      opacity: 0.85;
    }

    .bottom-nav-btn.primary {
      background: linear-gradient(135deg, #ffb86c, #ff6b6b);
      border-color: transparent;
      color: #0b0b10;
      font-weight: 600;
      opacity: 1;
    }
  </style>
</head>

<body class="collab-result-page">
  <div class="result-shell">
    <header class="collabs-header">
      <div class="brand-title">Roll Show · Collab Result</div>
      <span class="pill">Final Edit</span>
    </header>

    <main class="result-main">
      <!-- LEFT: Final video -->
      <section class="panel">
        <div class="panel-title">Final Stitched Video</div>

        <div class="video-preview" id="collab-video-preview">
          Final stitched collab video will render here.
        </div>

        <button class="btn-primary" id="collab-post-feed">
          Post to Unified Feed
        </button>
      </section>

      <!-- RIGHT: Details -->
      <aside class="panel">
        <div class="panel-title">Details</div>

        <section class="sidebar-section">
          <div style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 0.35rem;">Skaters</div>
          <div class="sidebar-list">
            <div class="sidebar-item">
              Handles
              <span id="collab-skaters">@boardwalkclay × @otherSkater</span>
            </div>
          </div>
        </section>

        <section class="sidebar-section">
          <div style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 0.35rem;">Spots</div>
          <div class="sidebar-list">
            <div class="sidebar-item">
              Locations
              <span id="collab-spots">BeltLine · Eastside Trail · Local Rink</span>
            </div>
          </div>
        </section>

        <section class="sidebar-section">
          <div style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 0.35rem;">Metadata</div>
          <div class="sidebar-list">
            <div class="sidebar-item">
              Session
              <span id="collab-session-meta">In‑Person + Stitch · 2 clips</span>
            </div>
            <div class="sidebar-item">
              Music
              <span id="collab-music-meta">“Sunset Flow” · 92 BPM</span>
            </div>
          </div>
        </section>
      </aside>
    </main>

    <nav class="bottom-nav">
      <button class="bottom-nav-btn" id="nav-collab-back">Back</button>
      <button class="bottom-nav-btn primary" id="nav-collab-post">Post</button>
      <button class="bottom-nav-btn" id="nav-collab-edit">Edit Metadata</button>
    </nav>
  </div>

  <!-- JS later: load stitched media from /api/media, populate metadata, post to feed -->
</body>
</html>

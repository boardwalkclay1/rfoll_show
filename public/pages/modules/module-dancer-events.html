<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show – Dancer Events</title>

  <link rel="icon" href="/assets/icons/rollshow-favicon.png" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />
  <link rel="stylesheet" href="/assets/css/modules.css" />

  <style>
    :root {
      --modules-bg-image: url('/assets/backgrounds/dancer-events-bg.jpg');
    }

    body.dancer-events-page {
      background-image: var(--modules-bg-image);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .event-card {
      padding: 0.75rem 0.85rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 0.75rem;
    }

    .event-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .event-meta {
      font-size: 0.75rem;
      opacity: 0.75;
    }
  </style>
</head>

<body class="dancer-events-page">
  <div class="module-shell">

    <header class="collabs-header">
      <div class="brand-title">Roll Show · Dancer Events</div>
      <span class="pill">Dancer</span>
    </header>

    <main class="module-main">

      <section class="panel">
        <div class="panel-title">Upcoming Dancer Events</div>

        <div id="dancer-events-list">
          <div class="event-card">
            <div class="event-title">Sunset Dancer Jam · BeltLine</div>
            <div class="event-meta">Today · 6:30 PM</div>
          </div>

          <div class="event-card">
            <div class="event-title">Flow Battle · Piedmont Park</div>
            <div class="event-meta">Saturday · 4:00 PM</div>
          </div>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-title">Event Types</div>

        <ul style="opacity:0.8; font-size:0.8rem; line-height:1.5;">
          <li>Jams</li>
          <li>Meetups</li>
          <li>Flow Battles</li>
          <li>Cinematic Sessions</li>
        </ul>
      </aside>

    </main>

  </div>
</body>
</html>

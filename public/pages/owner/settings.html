<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show • Owner • Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin:0; background:#0b0b0c; color:#fff; font-family:Inter,sans-serif; }
    .sidebar { position:fixed; top:0; left:0; width:260px; height:100vh; background:#111; border-right:1px solid rgba(255,255,255,0.08); padding:30px 20px; box-sizing:border-box; }
    .sidebar h1 { font-size:26px; margin-bottom:40px; font-weight:700; letter-spacing:1px; color:#ff0050; }
    .nav-link { display:block; padding:12px 10px; margin-bottom:10px; border-radius:6px; color:#ccc; text-decoration:none; font-size:15px; transition:0.2s; }
    .nav-link:hover { background:rgba(255,0,80,0.15); color:#fff; }
    .main { margin-left:260px; padding:40px; }
    .title { font-size:30px; font-weight:800; margin-bottom:10px; }
    .subtitle { color:#aaa; margin-bottom:30px; }
    .section { background:#141416; border-radius:10px; padding:20px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.06); }
    .section h3 { margin:0 0 10px; color:#ff0050; }
    label { display:block; margin-bottom:6px; font-size:14px; color:#ccc; }
    input, textarea { width:100%; padding:10px; border-radius:6px; border:1px solid #333; background:#111; color:#fff; font-size:14px; box-sizing:border-box; margin-bottom:10px; }
    button { padding:10px 18px; border-radius:6px; border:none; background:#ff0050; color:#fff; font-weight:600; cursor:pointer; }
    button:hover { background:#ff336f; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>OWNER</h1>
    <a class="nav-link" href="./owner-dashboard.html">Dashboard Overview</a>
    <a class="nav-link" href="./users.html">Users</a>
    <a class="nav-link" href="./skaters.html">Skaters</a>
    <a class="nav-link" href="./businesses.html">Businesses</a>
    <a class="nav-link" href="./musicians.html">Musicians</a>
    <a class="nav-link" href="./shows.html">Shows</a>
    <a class="nav-link" href="./contracts.html">Contracts</a>
    <a class="nav-link" href="./music.html">Music Library</a>
    <a class="nav-link" href="./settings.html">Platform Settings</a>
  </div>

  <div class="main">
    <div class="title">Platform Settings</div>
    <div class="subtitle">High-level controls for Roll Show.</div>

    <div class="section">
      <h3>Branding</h3>
      <label>Platform Name</label>
      <input id="platform-name" type="text" placeholder="Roll Show" />
      <label>Primary Color</label>
      <input id="primary-color" type="text" placeholder="#ff0050" />
      <button onclick="saveBranding()">Save Branding</button>
    </div>

    <div class="section">
      <h3>System Notes</h3>
      <label>Owner Notes</label>
      <textarea id="owner-notes" rows="4" placeholder="Internal notes about the platform..."></textarea>
      <button onclick="saveNotes()">Save Notes</button>
    </div>
  </div>

  <script>
    async function saveBranding() {
      const owner = JSON.parse(localStorage.getItem("rollshow_user") || "{}");
      const payload = {
        platform_name: document.getElementById("platform-name").value,
        primary_color: document.getElementById("primary-color").value
      };
      await fetch("/api/owner/settings/branding", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-owner-id": owner.id
        },
        body: JSON.stringify(payload)
      });
      alert("Branding saved.");
    }

    async function saveNotes() {
      const owner = JSON.parse(localStorage.getItem("rollshow_user") || "{}");
      const payload = {
        notes: document.getElementById("owner-notes").value
      };
      await fetch("/api/owner/settings/notes", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-owner-id": owner.id
        },
        body: JSON.stringify(payload)
      });
      alert("Notes saved.");
    }
  </script>
</body>
</html>

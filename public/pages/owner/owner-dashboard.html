<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Owner Dashboard • Roll Show</title>

  <link rel="icon" href="/favicon.png" />

  <!-- GLOBAL + OWNER STYLES -->
  <link rel="stylesheet" href="/app/styles/styles.css" />
  <link rel="stylesheet" href="/pages/owner/css/owner.css" />

  <style>
    /* ============================================================
       BACKGROUND — CLEAR, SLIGHT DARK, CINEMATIC
    ============================================================ */
    .bg-landing {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      filter: brightness(0.65) saturate(115%);
      z-index: -2;
      pointer-events: none;
    }

    /* ============================================================
       MAIN WRAPPER
    ============================================================ */
    .owner-shell {
      padding: 30px;
      max-width: 1500px;
      margin: 0 auto;
      color: white;
      position: relative;
      z-index: 5;
    }

    /* ============================================================
       BURGER MENU
    ============================================================ */
    .burger {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 32px;
      cursor: pointer;
      z-index: 30;
    }

    .burger div {
      height: 6px;
      background: white;
      margin: 5px 0;
      border-radius: 4px;
      transition: 0.3s;
    }

    /* ============================================================
       SIDEBAR — GLASS, NOT BLACK
    ============================================================ */
    .sidebar {
      position: fixed;
      top: 0;
      left: -260px;
      width: 260px;
      height: 100vh;
      background: rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(14px);
      border-right: 1px solid rgba(255,255,255,0.12);
      padding: 30px 20px;
      transition: 0.3s;
      z-index: 25;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar h2 {
      font-size: 22px;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .sidebar a {
      display: block;
      padding: 10px 0;
      color: white;
      text-decoration: none;
      opacity: 0.85;
      font-size: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar a:hover {
      opacity: 1;
    }

    /* ============================================================
       PAGE HEADER
    ============================================================ */
    .page-header h1 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .page-header p {
      opacity: 0.85;
      margin-bottom: 30px;
    }

    /* ============================================================
       SECTION TITLES
    ============================================================ */
    .section-title {
      margin-top: 40px;
      margin-bottom: 15px;
      font-size: 28px;
      font-weight: 700;
      border-left: 5px solid gold;
      padding-left: 12px;
    }

    /* ============================================================
       TILE GRID — GLASS CARDS
    ============================================================ */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }

    .tile {
      background: rgba(0, 0, 0, 0.18);
      padding: 22px;
      border-radius: 12px;
      text-align: center;
      color: white;
      text-decoration: none;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      font-weight: 600;
    }

    .tile:hover {
      background: rgba(0, 0, 0, 0.28);
      transform: translateY(-3px);
    }

    /* ============================================================
       ANALYTICS CARDS — GLASS
    ============================================================ */
    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: rgba(0, 0, 0, 0.18);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
    }

    .card h3 {
      font-size: 18px;
      margin-bottom: 8px;
      opacity: 0.85;
    }

    .card .value {
      font-size: 34px;
      font-weight: 800;
    }

    /* ============================================================
       RIGHT FEED — GLASS
    ============================================================ */
    .right-feed {
      position: fixed;
      top: 100px;
      right: 20px;
      width: 240px;
      height: 400px;
      background: rgba(0, 0, 0, 0.18);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      padding: 15px;
      overflow-y: auto;
      z-index: 20;
    }

    .right-feed h3 {
      font-size: 16px;
      margin-bottom: 10px;
      opacity: 0.85;
    }

    .feed-item {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

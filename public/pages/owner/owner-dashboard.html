<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Owner Dashboard • Roll Show</title>

  <!-- FAVICON (your platform standard) -->
  <link rel="icon" href="/favicon.ico" />

  <!-- GLOBAL + OWNER CSS -->
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/owner.css" />

  <!-- BACKGROUND (your platform standard) -->
  <style>
    body.bg-owner {
      background: url('/public/favicon.ico') no-repeat center center fixed;
      background-size: cover;
    }
  </style>
</head>

<body class="bg-owner">

  <div class="owner-shell">

    <header class="page-header">
      <h1>Owner Dashboard</h1>
      <p>Platform-wide metrics, activity, and controls.</p>
    </header>

    <main class="owner-main">

      <!-- OVERVIEW GRID -->
      <section class="owner-section full-width">
        <h2>Platform Overview</h2>
        <div id="overview-grid" class="overview-grid"></div>
      </section>

      <!-- MIGRATION RUNNER -->
      <section class="owner-section full-width">
        <h2>Database Tools</h2>

        <button id="runMigrationsBtn" class="danger-btn">
          Run All Migrations
        </button>

        <div id="migrationResult" class="migration-output"></div>
      </section>

    </main>

  </div>

  <!-- INLINE JS (NO BROKEN PATHS) -->
  <script type="module">
    /* ============================================================
       LOAD OWNER OVERVIEW
    ============================================================ */
    async function loadOwnerOverview() {
      const user = JSON.parse(localStorage.getItem("rollshow_user"));
      if (!user) return;

      const res = await fetch(`/api/owner/overview?owner=1&user=${user.id}`);

      if (!res.ok) {
        console.error("Owner API failed:", await res.text());
        return;
      }

      const data = await res.json();
      const grid = document.getElementById("overview-grid");

      const items = [
        { label: "Total Users", value: data.total_users },
        { label: "Skaters", value: data.total_skaters },
        { label: "Businesses", value: data.total_businesses },
        { label: "Musicians", value: data.total_musicians },
        { label: "Shows", value: data.total_shows },
        { label: "Tickets Sold", value: data.total_tickets },
        { label: "Purchases", value: data.total_purchases },
        { label: "Revenue", value: "$" + data.total_revenue }
      ];

      grid.innerHTML = "";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>${item.label}</h3>
          <p>${item.value}</p>
        `;
        grid.appendChild(card);
      });
    }

    loadOwnerOverview();


    /* ============================================================
       RUN MIGRATIONS BUTTON
    ============================================================ */
    document.getElementById("runMigrationsBtn").addEventListener("click", async () => {
      const user = JSON.parse(localStorage.getItem("rollshow_user"));
      if (!user) return;

      document.getElementById("migrationResult").innerHTML =
        "<p>Running migrations…</p>";

      const res = await fetch(`/api/owner/run-migrations?owner=1&user=${user.id}`, {
        method: "POST"
      });

      const data = await res.json();

      document.getElementById("migrationResult").innerHTML = `
        <pre>${JSON.stringify(data, null, 2)}</pre>
      `;
    });
  </script>

</body>
</html>

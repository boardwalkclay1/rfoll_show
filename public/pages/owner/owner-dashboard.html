<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Roll Show • Owner Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0b0b0c;
      font-family: "Inter", sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* Cinematic Glow */
    .glow {
      text-shadow: 0 0 12px rgba(255, 0, 80, 0.8),
                   0 0 24px rgba(255, 0, 80, 0.4);
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: #111;
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 30px 20px;
      box-sizing: border-box;
    }

    .sidebar h1 {
      font-size: 26px;
      margin-bottom: 40px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #ff0050;
    }

    .nav-link {
      display: block;
      padding: 12px 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      color: #ccc;
      text-decoration: none;
      font-size: 15px;
      transition: 0.2s;
    }

    .nav-link:hover {
      background: rgba(255, 0, 80, 0.15);
      color: #fff;
    }

    /* Main Content */
    .main {
      margin-left: 260px;
      padding: 40px;
    }

    .title {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 20px;
      color: #fff;
    }

    .subtitle {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 40px;
    }

    /* Cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #141416;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 0, 80, 0.4);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 20px;
      color: #ff0050;
    }

    .card p {
      margin: 0;
      color: #ccc;
      font-size: 15px;
    }

    /* Quick Jump Buttons */
    .jump-btn {
      display: inline-block;
      padding: 14px 22px;
      margin: 10px 10px 10px 0;
      background: #ff0050;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    .jump-btn:hover {
      background: #ff336f;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h1 class="glow">OWNER</h1>

    <a class="nav-link" href="./owner-dashboard.html">Dashboard Overview</a>
    <a class="nav-link" href="./users.html">Users</a>
    <a class="nav-link" href="./skaters.html">Skaters</a>
    <a class="nav-link" href="./businesses.html">Businesses</a>
    <a class="nav-link" href="./musicians.html">Musicians</a>
    <a class="nav-link" href="./shows.html">Shows</a>
    <a class="nav-link" href="./contracts.html">Contracts</a>
    <a class="nav-link" href="./music.html">Music Library</a>
    <a class="nav-link" href="./settings.html">Platform Settings</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="title glow">Roll Show Owner Dashboard</div>
    <div class="subtitle">Your command center for the entire platform.</div>

    <!-- QUICK JUMPS -->
    <div style="margin-bottom: 40px;">
      <a class="jump-btn" href="/pages/skater-dashboard.html">View Skater Dashboard</a>
      <a class="jump-btn" href="/pages/business-dashboard.html">View Business Dashboard</a>
      <a class="jump-btn" href="/pages/musician-dashboard.html">View Musician Dashboard</a>
      <a class="jump-btn" href="/pages/buyer-dashboard.html">View Buyer Dashboard</a>
    </div>

    <!-- SYSTEM OVERVIEW CARDS -->
    <div class="grid" id="overview-grid">
      <!-- JS will fill these -->
    </div>
  </div>

  <script>
    async function loadOverview() {
      const res = await fetch("/api/owner/overview", {
        headers: { "x-owner-id": JSON.parse(localStorage.getItem("rollshow_user")).id }
      });

      const data = await res.json();
      const grid = document.getElementById("overview-grid");

      const items = [
        { label: "Total Users", value: data.total_users },
        { label: "Skaters", value: data.total_skaters },
        { label: "Businesses", value: data.total_businesses },
        { label: "Musicians", value: data.total_musicians },
        { label: "Shows", value: data.total_shows },
        { label: "Tickets Sold", value: data.total_tickets },
        { label: "Purchases", value: data.total_purchases },
        { label: "Revenue", value: "$" + data.total_revenue }
      ];

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h3>${item.label}</h3>
          <p>${item.value}</p>
        `;
        grid.appendChild(card);
      });
    }

    loadOverview();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Owner — Business Applications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" href="/app/images/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/app/images/icons/icon-512.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta property="og:image" content="/app/images/roll-index.jpg">

  <link rel="stylesheet" href="/app/styles/styles.css">

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</head>

<body class="rs-body">

  <img src="/app/images/roll-index.jpg" class="bg-landing" alt="Background">

  <main class="rs-auth-shell">
    <section class="rs-card">
      <h1 class="rs-title">Business Applications</h1>
      <table class="rs-table" id="applications-table">
        <thead>
          <tr>
            <th>Company</th>
            <th>Owner</th>
            <th>Website</th>
            <th>Phone</th>
            <th>Submitted</th>
            <th>Status</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="/app/js/owner/business-applications.js" type="module"></script>
</body>
</html>

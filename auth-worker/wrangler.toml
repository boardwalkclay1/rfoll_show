name = "rollshow-auth"
main = "index.js"
compatibility_date = "2024-01-01"
workers_dev = true

# Top-level D1 binding (keeps local/dev behavior)
[[d1_databases]]
binding = "DB_roll"
database_name = "rollshow"
database_id = "c7f658f4-54f4-4717-a9de-cbb9f8e4b6ef"

# Production environment overrides / vars
[env.production]
# Environment variables available to the worker at runtime
vars = { AUTH_UPSTREAM = "https://rollshow-auth.boardwalkclay1.workers.dev" }

# Ensure the production env also has the D1 binding explicitly declared
[[env.production.d1_databases]]
binding = "DB_roll"
database_name = "rollshow"
database_id = "c7f658f4-54f4-4717-a9de-cbb9f8e4b6ef"
